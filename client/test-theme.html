<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Theme</title>
  <link rel="stylesheet" href="/src/index.css">
  <style>
    body { margin: 0; padding: 2rem; font-family: system-ui; }
    .test-grid { display: grid; gap: 1rem; max-width: 600px; }
  </style>
</head>
<body class="theme-bg">
  <h1 class="theme-title">Тест темы</h1>
  
  <div class="test-grid">
    <!-- Панель -->
    <div class="theme-panel p-4">
      <p class="theme-text-primary">.theme-panel</p>
      <p class="theme-text-muted">Текст .theme-text-muted</p>
    </div>
    
    <!-- Кнопки -->
    <div class="flex gap-2">
      <button class="theme-btn theme-btn-primary">Primary</button>
      <button class="theme-btn theme-btn-secondary">Secondary</button>
      <button class="theme-btn theme-btn-ghost">Ghost</button>
    </div>
    
    <!-- Инпут -->
    <input type="text" class="theme-input" placeholder="Тест инпута...">
    
    <!-- Уведомления -->
    <div class="theme-toast success">✓ Успех</div>
    <div class="theme-toast error">✗ Ошибка</div>
    
    <!-- Цвета групп -->
    <div class="flex gap-2">
      <div class="property-red w-8 h-8 rounded"></div>
      <div class="property-green w-8 h-8 rounded"></div>
      <div class="property-blue w-8 h-8 rounded"></div>
    </div>
  </div>
  
  <script>
    console.log('Theme test loaded');
    console.log('CSS vars:', getComputedStyle(document.documentElement).getPropertyValue('--color-bg-primary'));
  </script>
</body>
</html>
